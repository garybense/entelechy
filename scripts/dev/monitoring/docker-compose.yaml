services:
  grafana-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: entelechy-monitoring
    ports:
      # Grafana UI
      - "3000:3000"
      # OTLP gRPC (traces)
      - "4317:4317"
      # OTLP HTTP (traces)
      - "4318:4318"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      # Mount Prometheus config for scraping Entelechy API metrics (override LGTM default)
      - ./prometheus.yml:/otel-lgtm/prometheus.yaml:ro
      # Mount Entelechy dashboards to LGTM directory (where default dashboards are)
      - ../../../monitoring/grafana/dashboards/entelechy-operations.json:/otel-lgtm/entelechy-operations.json:ro
      - ../../../monitoring/grafana/dashboards/entelechy-llm.json:/otel-lgtm/entelechy-llm.json:ro
      - ../../../monitoring/grafana/dashboards/entelechy-api-service.json:/otel-lgtm/entelechy-api-service.json:ro
      # Mount custom dashboard provisioning config that includes Entelechy dashboards
      - ./grafana-dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml:ro
    restart: unless-stopped
    networks:
      - entelechy
    extra_hosts:
      # Allow container to reach host services (Entelechy API on localhost:8888)
      - "host.docker.internal:host-gateway"

networks:
  entelechy:
    name: entelechy-network
    external: true
