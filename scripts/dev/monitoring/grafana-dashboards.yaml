apiVersion: 1

providers:
  # Default LGTM dashboards
  - name: "RED Metrics (classic histogram)"
    type: file
    options:
      path: /otel-lgtm/grafana-dashboard-red-metrics-classic.json
      foldersFromFilesStructure: false
  - name: "RED Metrics (exponential/native histogram)"
    type: file
    options:
      path: /otel-lgtm/grafana-dashboard-red-metrics-native.json
      foldersFromFilesStructure: false
  - name: "JVM Metrics"
    type: file
    options:
      path: /otel-lgtm/grafana-dashboard-jvm-metrics.json
      foldersFromFilesStructure: false

  # Entelechy dashboards
  - name: "Entelechy Operations"
    type: file
    options:
      path: /otel-lgtm/entelechy-operations.json
      foldersFromFilesStructure: false
  - name: "Entelechy LLM"
    type: file
    options:
      path: /otel-lgtm/entelechy-llm.json
      foldersFromFilesStructure: false
  - name: "Entelechy API Service"
    type: file
    options:
      path: /otel-lgtm/entelechy-api-service.json
      foldersFromFilesStructure: false
