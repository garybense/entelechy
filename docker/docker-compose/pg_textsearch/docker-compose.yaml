name: entelechy
# Docker Compose file for Entelechy with PostgreSQL and Timescale pg_textsearch
# docker compose -f docker/docker-compose/pg_textsearch/docker-compose.yaml down && sleep 2 && docker compose -f docker/docker-compose/pg_textsearch/docker-compose.yaml up -d
# Make sure to set the required environment variables before running:
# - ENTELECHY_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the entelechy service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - ENTELECHY_VERSION: Entelechy application version (default: latest)
# - ENTELECHY_DB_USER: PostgreSQL user (default: entelechy_user)
# - ENTELECHY_DB_NAME: PostgreSQL database name (default: entelechy_db)

services:
  db:
    # Use custom PostgreSQL image with pgvector and pg_textsearch extensions
    build:
      context: .
      dockerfile: Dockerfile
    container_name: entelechy-db
    restart: always
    # Expose PostgreSQL port
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: ${ENTELECHY_DB_USER:-entelechy_user}
      POSTGRES_PASSWORD: ${ENTELECHY_DB_PASSWORD:-entelechy_password}
      POSTGRES_DB: ${ENTELECHY_DB_NAME:-entelechy_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - entelechy-net

  pg-textsearch-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      - PGPASSWORD=${ENTELECHY_DB_PASSWORD:-entelechy_password}
    command: >
      bash -c "
        echo 'Waiting for PostgreSQL to be ready...';
        until pg_isready -h entelechy-db -p 5432 -U entelechy_user; do
          echo 'PostgreSQL is unavailable - sleeping';
          sleep 2;
        done;
        echo 'PostgreSQL is ready - creating entelechy_db database';
        psql -h entelechy-db -p 5432 -U entelechy_user -c 'CREATE DATABASE entelechy_db;' 2>/dev/null || echo 'Database already exists';
        echo 'Creating extensions in entelechy_db database';
        psql -h entelechy-db -p 5432 -U entelechy_user -d entelechy_db -c 'CREATE EXTENSION IF NOT EXISTS vector CASCADE;';
        psql -h entelechy-db -p 5432 -U entelechy_user -d entelechy_db -c 'CREATE EXTENSION IF NOT EXISTS pg_textsearch CASCADE;';
        echo 'Database and extensions created successfully';
      "
    restart: "no"
    networks:
      - entelechy-net

  entelechy:
    image: ghcr.io/garybense/entelechy:${ENTELECHY_VERSION:-latest}
    container_name: entelechy-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      # LLM Configuration
      ENTELECHY_API_LLM_PROVIDER: ${ENTELECHY_API_LLM_PROVIDER:-openai}
      ENTELECHY_API_LLM_API_KEY: ${OPENAI_API_KEY:-your-api-key}

      # Database Configuration
      ENTELECHY_API_DATABASE_URL: postgresql://${ENTELECHY_DB_USER:-entelechy_user}:${ENTELECHY_DB_PASSWORD:-entelechy_password}@db:5432/${ENTELECHY_DB_NAME:-entelechy_db}

      # Vector and Text Search Extensions
      ENTELECHY_API_VECTOR_EXTENSION: pgvector
      ENTELECHY_API_TEXT_SEARCH_EXTENSION: pg_textsearch

    depends_on:
      - db
    networks:
      - entelechy-net


networks:
  entelechy-net:
    driver: bridge

volumes:
  pg_data:
