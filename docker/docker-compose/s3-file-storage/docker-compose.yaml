# Docker Compose file for Entelechy with S3 file storage (SeaweedFS)
#
# SeaweedFS (Apache 2.0) provides an S3-compatible object storage backend
# for storing uploaded files instead of PostgreSQL BYTEA storage.
#
# Make sure to set the required environment variables before running:
# - ENTELECHY_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the entelechy service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - ENTELECHY_VERSION: Entelechy application version (default: latest)
# - ENTELECHY_DB_USER: PostgreSQL user (default: entelechy_user)
# - ENTELECHY_DB_NAME: PostgreSQL database name (default: entelechy_db)
# - ENTELECHY_DB_VERSION: PostgreSQL version (default: 18)
# - SEAWEEDFS_S3_ACCESS_KEY: S3 access key (default: entelechy_s3_key)
# - SEAWEEDFS_S3_SECRET_KEY: S3 secret key (default: entelechy_s3_secret)

services:
  db:
    image: pgvector/pgvector:pg${ENTELECHY_DB_VERSION:-18}
    container_name: entelechy-db
    restart: always
    environment:
      POSTGRES_USER: ${ENTELECHY_DB_USER:-entelechy_user}
      POSTGRES_PASSWORD: ${ENTELECHY_DB_PASSWORD:?Please set the ENTELECHY_DB_PASSWORD env variable}
      POSTGRES_DB: ${ENTELECHY_DB_NAME:-entelechy_db}
    volumes:
      - pg_data:/var/lib/postgresql/${ENTELECHY_DB_VERSION:-18}/docker
    networks:
      - entelechy-net

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: entelechy-seaweedfs
    restart: always
    # Single-node mode: master + volume + filer + S3 gateway all in one process
    command: >
      server
      -s3
      -s3.port=8333
      -s3.config=/etc/seaweedfs/s3.json
      -ip.bind=0.0.0.0
    volumes:
      - seaweedfs_data:/data
      - ./s3.json:/etc/seaweedfs/s3.json:ro
    # Expose S3 API port (uncomment to access from host)
    # ports:
    #   - "8333:8333"
    networks:
      - entelechy-net

  entelechy:
    image: ghcr.io/garybense/entelechy:${ENTELECHY_VERSION:-latest}
    container_name: entelechy-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      - ENTELECHY_API_LLM_API_KEY=${OPENAI_API_KEY?Please set the OPENAI_API_KEY env variable}
      - ENTELECHY_API_DATABASE_URL=postgresql://${ENTELECHY_DB_USER:-entelechy_user}:${ENTELECHY_DB_PASSWORD:?Please set the ENTELECHY_DB_PASSWORD env variable}@db:5432/${ENTELECHY_DB_NAME:-entelechy_db}
      # S3 file storage configuration (SeaweedFS)
      - ENTELECHY_API_FILE_STORAGE_TYPE=s3
      - ENTELECHY_API_FILE_STORAGE_S3_BUCKET=entelechy
      - ENTELECHY_API_FILE_STORAGE_S3_ENDPOINT=http://seaweedfs:8333
      - ENTELECHY_API_FILE_STORAGE_S3_REGION=us-east-1
      - ENTELECHY_API_FILE_STORAGE_S3_ACCESS_KEY_ID=${SEAWEEDFS_S3_ACCESS_KEY:-entelechy_s3_key}
      - ENTELECHY_API_FILE_STORAGE_S3_SECRET_ACCESS_KEY=${SEAWEEDFS_S3_SECRET_KEY:-entelechy_s3_secret}
    depends_on:
      - db
      - seaweedfs
    networks:
      - entelechy-net

networks:
  entelechy-net:
    driver: bridge

volumes:
  pg_data:
  seaweedfs_data:
