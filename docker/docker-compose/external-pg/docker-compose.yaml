# Docker Compose file for Entelechy with PostgreSQL and pgvector
#
# Make sure to set the required environment variables before running:
# - ENTELECHY_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the entelechy service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - ENTELECHY_VERSION: Entelechy application version (default: latest)
# - ENTELECHY_DB_USER: PostgreSQL user (default: entelechy_user)
# - ENTELECHY_DB_NAME: PostgreSQL database name (default: entelechy_db)
# - ENTELECHY_DB_VERSION: PostgreSQL version (default: 18)

services:
  db:
    # Use a PostgreSQL-Image with pgvector extension pre-installed
    # see https://hub.docker.com/r/pgvector/pgvector 
    image: pgvector/pgvector:pg${ENTELECHY_DB_VERSION:-18}
    container_name: entelechy-db
    restart: always
    # Expose PostgreSQL port
    # ports:
      # - "5432:5432"
    environment:
      POSTGRES_USER: ${ENTELECHY_DB_USER:-entelechy_user}
      POSTGRES_PASSWORD: ${ENTELECHY_DB_PASSWORD:?Please set the ENTELECHY_DB_PASSWORD env variable}
      POSTGRES_DB: ${ENTELECHY_DB_NAME:-entelechy_db}
    volumes:
      - pg_data:/var/lib/postgresql/${ENTELECHY_DB_VERSION:-18}/docker
    networks:
      - entelechy-net

  entelechy:
    image: ghcr.io/vectorize-io/entelechy:${ENTELECHY_VERSION:-latest}
    container_name: entelechy-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      - ENTELECHY_API_LLM_API_KEY=${OPENAI_API_KEY?Please set the OPENAI_API_KEY env variable}
      - ENTELECHY_API_DATABASE_URL=postgresql://${ENTELECHY_DB_USER:-entelechy_user}:${ENTELECHY_DB_PASSWORD:?Please set the ENTELECHY_DB_PASSWORD env variable}@db:5432/${ENTELECHY_DB_NAME:-entelechy_db}
    depends_on:
      - db
    networks:
      - entelechy-net

networks:
  entelechy-net:
    driver: bridge

volumes:
  pg_data:
