name: entelechy
# Docker Compose file for Entelechy with Timescale extensions
# - pgvectorscale: DiskANN vector search (disk-based, scalable)
# - pg_textsearch: BM25 text search (high-performance keyword retrieval)
#
# Quick start:
# docker compose -f docker/docker-compose/timescale/docker-compose.yaml up -d --build
#
# Required environment variables:
# - ENTELECHY_DB_PASSWORD: Password for the PostgreSQL user
# - OPENAI_API_KEY (or configure another LLM provider)
#
# Optional environment variables with defaults:
# - ENTELECHY_VERSION: Entelechy application version (default: latest)
# - ENTELECHY_DB_USER: PostgreSQL user (default: entelechy_user)
# - ENTELECHY_DB_NAME: PostgreSQL database name (default: entelechy_db)

services:
  db:
    # Custom PostgreSQL image with Timescale extensions (pgvectorscale + pg_textsearch)
    build:
      context: .
      dockerfile: Dockerfile
    container_name: entelechy-db-timescale
    restart: always
    # Expose PostgreSQL port (using 5438 to avoid conflicts with other setups)
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: ${ENTELECHY_DB_USER:-entelechy_user}
      POSTGRES_PASSWORD: ${ENTELECHY_DB_PASSWORD:-entelechy_password}
      POSTGRES_DB: ${ENTELECHY_DB_NAME:-entelechy_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - entelechy-net
    # Health check to ensure database is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entelechy_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescale-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGPASSWORD=${ENTELECHY_DB_PASSWORD:-entelechy_password}
    command: >
      bash -c "
        echo 'PostgreSQL is ready - creating entelechy_db database';
        psql -h entelechy-db-timescale -p 5432 -U entelechy_user -c 'CREATE DATABASE entelechy_db;' 2>/dev/null || echo 'Database already exists';
        echo 'Installing Timescale extensions...';
        echo '1/3: Installing pgvector (required by pgvectorscale)...';
        psql -h entelechy-db-timescale -p 5432 -U entelechy_user -d entelechy_db -c 'CREATE EXTENSION IF NOT EXISTS vector CASCADE;';
        echo '2/3: Installing pgvectorscale (DiskANN vector search)...';
        psql -h entelechy-db-timescale -p 5432 -U entelechy_user -d entelechy_db -c 'CREATE EXTENSION IF NOT EXISTS vectorscale CASCADE;';
        echo '3/3: Installing pg_textsearch (BM25 text search)...';
        psql -h entelechy-db-timescale -p 5432 -U entelechy_user -d entelechy_db -c 'CREATE EXTENSION IF NOT EXISTS pg_textsearch CASCADE;';
        echo '';
        echo '✅ Timescale extensions installed successfully';
        echo '';
        echo 'Installed extensions:';
        psql -h entelechy-db-timescale -p 5432 -U entelechy_user -d entelechy_db -c \"\\dx\" | grep -E '(vector|vectorscale|pg_textsearch)';
      "
    restart: "no"
    networks:
      - entelechy-net

  entelechy:
    image: ghcr.io/vectorize-io/entelechy:${ENTELECHY_VERSION:-latest}
    container_name: entelechy-app-timescale
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      # LLM Configuration
      ENTELECHY_API_LLM_PROVIDER: ${ENTELECHY_API_LLM_PROVIDER:-openai}
      ENTELECHY_API_LLM_API_KEY: ${OPENAI_API_KEY:-your-api-key}

      # Database Configuration
      ENTELECHY_API_DATABASE_URL: postgresql://${ENTELECHY_DB_USER:-entelechy_user}:${ENTELECHY_DB_PASSWORD:-entelechy_password}@db:5432/${ENTELECHY_DB_NAME:-entelechy_db}

      # Timescale Extensions
      # pgvectorscale: DiskANN algorithm for disk-based scalable vector search
      ENTELECHY_API_VECTOR_EXTENSION: pgvectorscale
      # pg_textsearch: High-performance BM25 text search
      ENTELECHY_API_TEXT_SEARCH_EXTENSION: pg_textsearch

    depends_on:
      db:
        condition: service_healthy
      timescale-init:
        condition: service_completed_successfully
    networks:
      - entelechy-net


networks:
  entelechy-net:
    driver: bridge

volumes:
  pg_data:
