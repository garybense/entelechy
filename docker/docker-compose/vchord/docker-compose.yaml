name: entelechy
# Docker Compose file for Entelechy with PostgreSQL and vectorchord
# docker compose -f docker/docker-compose/docker-compose.yaml down && sleep 2 && docker compose -f docker/docker-compose/docker-compose.yaml up -d
# Make sure to set the required environment variables before running:
# - ENTELECHY_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the entelechy service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - ENTELECHY_VERSION: Entelechy application version (default: latest)
# - ENTELECHY_DB_USER: PostgreSQL user (default: entelechy_user)
# - ENTELECHY_DB_NAME: PostgreSQL database name (default: entelechy_db)
# - ENTELECHY_DB_VERSION: PostgreSQL version (default: 18)

services:
  db:
    # Use a PostgreSQL-Image with vectorchord extension pre-installed
    image: tensorchord/vchord-suite:pg${ENTELECHY_DB_VERSION:-18-latest}
    container_name: entelechy-db
    restart: always
    # Expose PostgreSQL port
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: ${ENTELECHY_DB_USER:-entelechy_user}
      POSTGRES_PASSWORD: ${ENTELECHY_DB_PASSWORD:-entelechy_password}
      POSTGRES_DB: ${ENTELECHY_DB_NAME:-entelechy_db}
    volumes:
      - pg_data:/var/lib/postgresql/${ENTELECHY_DB_VERSION:-18}/docker
    networks:
      - entelechy-net

  vectorchord-init:
    image: tensorchord/vchord-suite:pg18-latest
    #container_name: vectorchord-init
    depends_on:
      - db
    environment:
      - PGPASSWORD=${ENTELECHY_DB_PASSWORD:-entelechy_password}
    command: >
      bash -c "
        echo 'Waiting for PostgreSQL to be ready...';
        until pg_isready -h entelechy-db -p 5432 -U entelechy_user; do
          echo 'PostgreSQL is unavailable - sleeping';
          sleep 2;
        done;
        echo 'PostgreSQL is ready - creating entelechy_db database';
        psql -h entelechy-db -p 5432 -U entelechy_user -c 'CREATE DATABASE entelechy_db;' 2>/dev/null || echo 'Database already exists';
        echo 'Creating extensions in entelechy_db database';
        psql -h entelechy-db -p 5432 -U entelechy_user -d entelechy_db -c 'CREATE EXTENSION IF NOT EXISTS vchord CASCADE;';
        psql -h entelechy-db -p 5432 -U entelechy_user -d entelechy_db -c 'CREATE EXTENSION IF NOT EXISTS pg_tokenizer CASCADE;';
        psql -h entelechy-db -p 5432 -U entelechy_user -d entelechy_db -c 'CREATE EXTENSION IF NOT EXISTS vchord_bm25 CASCADE;';
        echo 'Creating llmlingua2 tokenizer';
        psql -h entelechy-db -p 5432 -U entelechy_user -d entelechy_db -c \"SELECT create_tokenizer('llmlingua2', \\$\\$ model = \\\"llmlingua2\\\" \\$\\$);\" 2>/dev/null || echo 'Tokenizer already exists or creation skipped';
        echo 'Database and extensions created successfully';
      "
    restart: "no"
    networks:
      - entelechy-net

  entelechy:
    image: ghcr.io/garybense/entelechy:${ENTELECHY_VERSION:-latest}
    container_name: entelechy-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      # LLM Configuration (uses OpenAI for testing vchord)
      # LLM configuration
      ENTELECHY_API_LLM_PROVIDER: ${ENTELECHY_API_LLM_PROVIDER:-openai}
      ENTELECHY_API_LLM_API_KEY: ${OPENAI_API_KEY:-your-api-key}

      # Database Configuration
      ENTELECHY_API_DATABASE_URL: postgresql://${ENTELECHY_DB_USER:-entelechy_user}:${ENTELECHY_DB_PASSWORD:-entelechy_password}@db:5432/${ENTELECHY_DB_NAME:-entelechy_db}

      # Vector and Text Search Extensions
      ENTELECHY_API_VECTOR_EXTENSION: vchord
      ENTELECHY_API_TEXT_SEARCH_EXTENSION: vchord

    depends_on:
      - db
    networks:
      - entelechy-net


networks:
  entelechy-net:
    driver: bridge

volumes:
  pg_data:
